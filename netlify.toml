[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions."poll-website-forms"]
  schedule = "*/15 * * * *"

[[redirects]]
  from = "/api/website-lead"
  to = "/.netlify/functions/website-lead"
  status = 200

[[redirects]]
  from = "/auth/google/callback"
  to = "/.netlify/functions/google-oauth-callback"
  status = 200

[[redirects]]
  from = "/api/google-oauth-start"
  to = "/.netlify/functions/google-oauth-start"
  status = 200

[[redirects]]
  from = "/api/google-oauth-disconnect"
  to = "/.netlify/functions/google-oauth-disconnect"
  status = 200

[[redirects]]
  from = "/api/calendar-events"
  to = "/.netlify/functions/calendar-events"
  status = 200

[[redirects]]
  from = "/api/research-attendee"
  to = "/.netlify/functions/research-attendee"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
