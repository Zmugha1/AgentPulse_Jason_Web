[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "GA4_PROPERTY_ID"

[functions."poll-website-forms"]
  schedule = "*/15 * * * *"

[functions."scan-gmail-leads"]
  schedule = "*/15 * * * *"

[[redirects]]
  from = "/api/website-lead"
  to = "/.netlify/functions/website-lead"
  status = 200

[[redirects]]
  from = "/auth/google/callback"
  to = "/.netlify/functions/google-oauth-callback"
  status = 200

